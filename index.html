<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake Arcade</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface-color: #1a1a1e;
            --accent-color: #00ff41;
            --text-color: #e0e0e0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-frame {
            width: 90vw;
            max-width: 380px;
            height: 80vh;
            background: var(--surface-color);
            border-radius: 40px;
            border: 8px solid #333;
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .phone-frame::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        #game-canvas {
            background: #000;
            width: 100%;
            aspect-ratio: 1/1;
            border: 2px solid #333;
            image-rendering: pixelated;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            flex-grow: 1;
        }

        .btn {
            background: #2a2a30;
            border: none;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #111;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #111;
        }

        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
        }

        .overlay h2 {
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 15px 30px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="header">
            <div class="score-board">
                <span>SCORE: <span id="score">0</span></span>
                <span>HI: <span id="high-score">0</span></span>
            </div>
        </div>

        <canvas id="game-canvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn btn-up" id="up">▲</button>
            <button class="btn btn-left" id="left">◀</button>
            <button class="btn btn-down" id="down">▼</button>
            <button class="btn btn-right" id="right">▶</button>
        </div>

        <div id="overlay" class="overlay">
            <h2 id="msg">NEON SNAKE</h2>
            <button class="start-btn" id="start">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');
        const startBtn = document.getElementById('start');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval;
        let changingDirection = false;

        highScoreEl.textContent = highScore;

        function main() {
            if (didGameEnd()) {
                endGame();
                return;
            }

            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00ff41" : "#008f11";
                ctx.strokeStyle = "#000";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            snake.forEach(part => {
                if (part.x == food.x && part.y == food.y) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff003c";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff003c";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
        }

        function changeDirection(direction) {
            if (changingDirection) return;
            changingDirection = true;
            
            if (direction === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (direction === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (direction === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
            if (direction === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
        }

        function startGame() {
            snake = [{x: 10, y: 10}];
            score = 0;
            dx = 1; dy = 0;
            scoreEl.textContent = score;
            overlay.classList.add('hidden');
            createFood();
            main();
        }

        function endGame() {
            msg.textContent = "GAME OVER";
            startBtn.textContent = "RETRY";
            overlay.classList.remove('hidden');
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
        }

        document.getElementById('up').addEventListener('click', () => changeDirection('UP'));
        document.getElementById('down').addEventListener('click', () => changeDirection('DOWN'));
        document.getElementById('left').addEventListener('click', () => changeDirection('LEFT'));
        document.getElementById('right').addEventListener('click', () => changeDirection('RIGHT'));
        
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDirection('UP');
            if (e.key === 'ArrowDown') changeDirection('DOWN');
            if (e.key === 'ArrowLeft') changeDirection('LEFT');
            if (e.key === 'ArrowRight') changeDirection('RIGHT');
        });

        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
